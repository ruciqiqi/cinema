  <text x="150" y="250" text-anchor="middle" font-family="sans-serif" font-size="28" font-weight="bold" fill="white" filter="url(#glow)">熊出没·重启未来</text>
  <text x="150" y="280" text-anchor="middle" font-family="sans-serif" font-size="12" fill="rgba(255,255,255,0.7)">2026-02-01 上映</text>
  <rect x="60" y="310" width="180" height="2" fill="rgba(255,255,255,0.2)"/>
