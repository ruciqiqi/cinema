<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#cc0000"/>
      <stop offset="50%" style="stop-color:#1a1aff"/>
      <stop offset="100%" style="stop-color:#000066"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="3" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="300" height="450" fill="url(#bg)"/>
  <circle cx="150" cy="100" r="50" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <circle cx="150" cy="100" r="38" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
  <text x="150" y="110" text-anchor="middle" font-size="55">🕷️</text>
  <text x="150" y="230" text-anchor="middle" font-family="sans-serif" font-size="14" fill="rgba(255,255,255,0.7)" letter-spacing="6">动画 / 动作</text>
  <text x="150" y="270" text-anchor="middle" font-family="sans-serif" font-size="28" font-weight="bold" fill="white" filter="url(#glow)">蜘蛛侠</text>
  <text x="150" y="300" text-anchor="middle" font-family="sans-serif" font-size="18" fill="rgba(255,255,255,0.8)">纵横宇宙2</text>
  <rect x="60" y="325" width="180" height="2" fill="rgba(255,255,255,0.2)"/>
  <text x="150" y="350" text-anchor="middle" font-family="sans-serif" font-size="10" fill="rgba(255,255,255,0.5)">导演：乔伊姆·多斯·桑托斯</text>
  <text x="150" y="370" text-anchor="middle" font-family="sans-serif" font-size="10" fill="rgba(255,255,255,0.5)">主演：沙梅克·摩尔 / 海莉·斯坦菲尔德</text>
  <rect x="80" y="390" width="140" height="30" rx="15" fill="rgba(255,255,255,0.15)"/>
  <text x="150" y="410" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="bold" fill="#ffd700">★ 9.1</text>
</svg>
