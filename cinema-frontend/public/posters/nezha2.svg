  <text x="150" y="75" text-anchor="middle" font-size="40" fill="#ffd700" filter="url(#glow)">🔥</text>
  <text x="150" y="210" text-anchor="middle" font-family="sans-serif" font-size="14" fill="rgba(255,255,255,0.8)" letter-spacing="6">动画 / 奇幻</text>
  <text x="150" y="250" text-anchor="middle" font-family="sans-serif" font-size="32" font-weight="bold" fill="white" filter="url(#glow)">哪吒之魔童闹海</text>
  <text x="150" y="280" text-anchor="middle" font-family="sans-serif" font-size="12" fill="rgba(255,255,255,0.7)">2026-02-01 上映</text>
  <rect x="60" y="310" width="180" height="2" fill="rgba(255,255,255,0.2)"/>
