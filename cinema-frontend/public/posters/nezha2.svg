  <rect x="80" y="375" width="140" height="30" rx="15" fill="rgba(255,255,255,0.15)"/>
  <text x="150" y="395" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="bold" fill="#ffd700">★ 9.5</text>
