<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4a2a0e"/>
      <stop offset="50%" style="stop-color:#8b5a2a"/>
      <stop offset="100%" style="stop-color:#c09060"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="3" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="300" height="450" fill="url(#bg)"/>
  <rect x="80" y="70" width="140" height="4" fill="rgba(255,215,0,0.3)"/>
  <rect x="100" y="80" width="100" height="3" fill="rgba(255,215,0,0.25)"/>
  <text x="150" y="110" text-anchor="middle" font-size="45">🎖️</text>
  <text x="150" y="200" text-anchor="middle" font-family="sans-serif" font-size="14" fill="rgba(255,255,255,0.7)" letter-spacing="6">战争 / 历史</text>
  <text x="150" y="240" text-anchor="middle" font-family="sans-serif" font-size="32" font-weight="bold" fill="white" filter="url(#glow)">志愿军</text>
  <text x="150" y="270" text-anchor="middle" font-family="sans-serif" font-size="18" fill="rgba(255,255,255,0.8)">存亡之战</text>
  <text x="150" y="295" text-anchor="middle" font-family="sans-serif" font-size="12" fill="rgba(255,255,255,0.6)">2026-01-25 上映</text>
  <rect x="60" y="320" width="180" height="2" fill="rgba(255,255,255,0.2)"/>
  <text x="150" y="345" text-anchor="middle" font-family="sans-serif" font-size="10" fill="rgba(255,255,255,0.5)">导演：陈凯歌</text>
  <text x="150" y="365" text-anchor="middle" font-family="sans-serif" font-size="10" fill="rgba(255,255,255,0.5)">主演：辛柏青 / 朱一龙 / 张子枫</text>
  <rect x="80" y="385" width="140" height="30" rx="15" fill="rgba(255,255,255,0.15)"/>
  <text x="150" y="405" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="bold" fill="#ffd700">★ 9.0</text>
</svg>
