  <text x="150" y="270" text-anchor="middle" font-family="sans-serif" font-size="32" font-weight="bold" fill="white" filter="url(#glow)">流浪地球3</text>
  <text x="150" y="300" text-anchor="middle" font-family="sans-serif" font-size="12" fill="rgba(255,255,255,0.6)">2026-02-10 上映</text>
  <rect x="60" y="330" width="180" height="2" fill="rgba(255,255,255,0.2)"/>
  <text x="150" y="355" text-anchor="middle" font-family="sans-serif" font-size="10" fill="rgba(255,255,255,0.5)">导演：郭帆</text>
