<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0c1445"/>
      <stop offset="50%" style="stop-color:#2d5fa5"/>
      <stop offset="100%" style="stop-color:#7ab8f5"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="3" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="300" height="450" fill="url(#bg)"/>
  <circle cx="150" cy="120" r="60" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <circle cx="150" cy="120" r="50" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
