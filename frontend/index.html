<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>星空影院 - 在线订票</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>

<!-- Toast 通知容器 -->
<div class="toast-container" id="toastContainer"></div>

<!-- 登录/注册模态框 -->
<div class="modal-overlay" id="authModal" style="display:none">
  <div class="modal-glass">
    <span class="modal-close" onclick="closeAuth()">&times;</span>
    <div class="modal-tabs">
      <button class="modal-tab active" data-tab="login" onclick="switchAuthTab('login',this)">登 录</button>
      <button class="modal-tab" data-tab="register" onclick="switchAuthTab('register',this)">注 册</button>
    </div>
    <div id="formLogin" class="auth-form">
      <div class="input-group"><span class="input-icon">👤</span><input type="text" id="loginUser" placeholder="用户名"></div>
      <div class="input-group"><span class="input-icon">🔒</span><input type="password" id="loginPass" placeholder="密码" onkeyup="if(event.key==='Enter')doLogin()"></div>
      <button class="btn-glass btn-full" onclick="doLogin()">登 录</button>
    </div>
    <div id="formRegister" class="auth-form" style="display:none">
      <div class="input-group"><span class="input-icon">👤</span><input type="text" id="regUser" placeholder="用户名（至少3位）"></div>
      <div class="input-group"><span class="input-icon">🔒</span><input type="password" id="regPass" placeholder="密码（至少6位）"></div>
      <div class="input-group"><span class="input-icon">📱</span><input type="text" id="regPhone" placeholder="手机号（选填）"></div>
      <button class="btn-glass btn-full" onclick="doRegister()">注 册</button>
    </div>
    <div id="authMsg" class="auth-msg"></div>
  </div>
</div>

<!-- ===== 顶部导航 ===== -->
<header class="header-glass">
  <div class="header-inner">
    <div class="header-left">
      <a class="logo" href="#home" onclick="navTo('home')">🎬 星空影院</a>
      <div class="cinema-selector" id="cinemaSelector">
        <select id="cinemaSelect" onchange="switchCinema()" class="select-glass">
          <option value="">加载中...</option>
        </select>
      </div>
    </div>
    <nav class="nav-links" id="navLinks">
      <a href="#home" onclick="navTo('home')" class="nav-active">首页</a>
      <a href="#movies" onclick="navTo('movies')">影片</a>
      <a href="#" id="navUserCenter" style="display:none" onclick="navTo('user')">个人中心</a>
      <a href="#" id="navAdmin" style="display:none" onclick="navTo('admin')">后台</a>
    </nav>
    <div class="header-right">
      <button class="btn-glass-sm" id="btnLogin" onclick="showAuth()">登录</button>
      <div id="userInfo" class="user-dropdown" style="display:none">
        <span class="user-avatar" onclick="navTo('user')">👤</span>
        <span id="userNameDisplay" onclick="navTo('user')" style="cursor:pointer;"></span>
        <button class="btn-glass-sm" onclick="doLogout()">退出</button>
      </div>
    </div>
  </div>
</header>

<!-- ===== 主内容区 ===== -->
<main class="main">

  <!-- ========== 首页 ========== -->
  <section id="page-home" class="page active">
    <div class="hero-banner" id="heroBanner">
      <div class="hero-slides" id="heroSlides"></div>
      <div class="hero-dots" id="heroDots"></div>
      <div class="hero-overlay">
        <div class="hero-text">
          <h1 id="heroTitle"></h1>
          <p id="heroDesc"></p>
          <button class="btn-glass btn-lg" id="heroBtn" onclick="">立即购票</button>
        </div>
      </div>
    </div>
    <div class="home-section">
      <div class="section-header">
        <h2>🔥 热映推荐</h2>
        <a href="#movies" onclick="navTo('movies')">查看全部 →</a>
      </div>
      <div class="movie-scroll" id="hotMovies"></div>
    </div>
    <div class="home-section">
      <div class="section-header">
        <h2>📢 影院公告</h2>
      </div>
      <div class="announcement-list" id="announcementList"></div>
    </div>
  </section>

  <!-- ========== 影片列表 ========== -->
  <section id="page-movies" class="page">
    <div class="movies-toolbar">
      <div class="filter-chips" id="genreChips"></div>
      <div class="search-group">
        <input type="text" id="movieSearch" placeholder="搜索影片..." onkeyup="if(event.key==='Enter')searchMovies()">
        <button class="btn-glass" onclick="searchMovies()">🔍</button>
      </div>
      <select id="movieSort" onchange="sortMovies()" class="select-glass">
        <option value="default">默认排序</option>
        <option value="rating">评分最高</option>
        <option value="boxOffice">票房最高</option>
        <option value="newest">最新上映</option>
      </select>
    </div>
    <div class="movie-grid" id="movieGrid"></div>
  </section>

  <!-- ========== 影片详情 ========== -->
  <section id="page-detail" class="page">
    <button class="btn-glass btn-back" onclick="navTo('movies')">← 返回</button>
    <div id="detailContent"></div>
    <div id="reviewSection"></div>
  </section>

  <!-- ========== 选座 ========== -->
  <section id="page-seats" class="page">
    <div class="seats-layout" id="seatsLayout"></div>
  </section>

  <!-- ========== 确认订单 ========== -->
  <section id="page-checkout" class="page">
    <div class="checkout-container" id="checkoutContent"></div>
  </section>

  <!-- ========== 下单成功 ========== -->
  <section id="page-success" class="page">
    <div class="success-container" id="successContent"></div>
  </section>

  <!-- ========== 个人中心 ========== -->
  <section id="page-user" class="page">
    <div class="user-layout">
      <div class="user-sidebar">
        <div class="user-card-glass">
          <div class="user-avatar-lg">👤</div>
          <h3 id="userCenterName"></h3>
          <p id="userCenterLevel"></p>
          <p>积分: <span id="userCenterPoints">0</span></p>
        </div>
        <a class="user-nav active" data-utab="orders" onclick="switchUserTab('orders',this)">🎫 我的订单</a>
        <a class="user-nav" data-utab="reviews" onclick="switchUserTab('reviews',this)">💬 我的评价</a>
        <a class="user-nav" data-utab="coupons" onclick="switchUserTab('coupons',this)">🎟️ 我的优惠券</a>
        <a class="user-nav" data-utab="notifications" onclick="switchUserTab('notifications',this)">🔔 消息通知</a>
        <a class="user-nav" data-utab="profile" onclick="switchUserTab('profile',this)">⚙️ 账号设置</a>
      </div>
      <div class="user-content" id="userContent"></div>
    </div>
  </section>

  <!-- ========== 后台管理 ========== -->
  <section id="page-admin" class="page">
    <div class="admin-layout">
      <div class="admin-sidebar">
        <h3>⚙️ 管理后台</h3>
        <a class="admin-nav active" data-atab="overview" onclick="switchAdminTab('overview',this)">📊 总览</a>
        <a class="admin-nav" data-atab="movies" onclick="switchAdminTab('movies',this)">🎬 影片</a>
        <a class="admin-nav" data-atab="showtimes" onclick="switchAdminTab('showtimes',this)">📅 场次</a>
        <a class="admin-nav" data-atab="bookings" onclick="switchAdminTab('bookings',this)">🎫 订单</a>
        <a class="admin-nav" data-atab="snacks" onclick="switchAdminTab('snacks',this)">🍕 卖品</a>
        <a class="admin-nav" data-atab="coupons" onclick="switchAdminTab('coupons',this)">🎟️ 优惠券</a>
        <a class="admin-nav" data-atab="cinemas" onclick="switchAdminTab('cinemas',this)">🏢 影院</a>
        <a class="admin-nav" data-atab="announcements" onclick="switchAdminTab('announcements',this)">📢 公告</a>
        <a class="admin-nav" data-atab="users" onclick="switchAdminTab('users',this)">👤 用户</a>
      </div>
      <div class="admin-content" id="adminContent"></div>
    </div>
  </section>

</main>

<script src="/js/app.js"></script>
</body>
</html>
